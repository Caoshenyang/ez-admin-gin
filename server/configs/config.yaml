app:
  # 应用名称，后续日志和部署信息会用到。
  name: ez-admin
  # 当前运行环境，本地开发先使用 dev。
  env: dev

server:
  # HTTP 服务监听地址。
  addr: ":8080"

database:
  # 数据库配置和 deploy/compose.local.yml 保持一致。
  host: localhost
  port: 5432
  user: ez_admin
  password: ez_admin_123456
  name: ez_admin

redis:
  # Redis 配置和 deploy/compose.local.yml 保持一致。
  host: localhost
  port: 6379
  password: ""
  db: 0

log:
  # 当前日志级别，开发阶段通常使用 info。
  level: info
  # console 适合本地阅读；生产环境可切换为 json。
  format: console
  # 日志文件位置，相对于 server/ 目录。
  filename: logs/app.log
  # 单个日志文件最大大小，单位 MB。
  max_size: 100
  # 最多保留多少个旧日志文件。
  max_backups: 7
  # 日志文件最多保留多少天。
  max_age: 30
  # 是否压缩旧日志文件。
  compress: false
